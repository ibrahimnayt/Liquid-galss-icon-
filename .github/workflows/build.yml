<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass — معاينة حزمة الأيقونات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#090b10;
    --bg-panel:rgba(255,255,255,0.035);
    --accent-a:#67e8f9;
    --accent-b:#a78bfa;
    --accent-c:#fbbf77;
    --text-primary:#eef2f8;
    --text-muted:#939db3;
    --stroke:rgba(255,255,255,0.14);
    --stroke-soft:rgba(255,255,255,0.08);
    --radius-tile:24px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg-deep);
    color:var(--text-primary);
    font-family:'IBM Plex Sans Arabic','Inter',sans-serif;
    overflow-x:hidden;
    position:relative;
    min-height:100vh;
  }
  .latin{font-family:'Space Grotesk',sans-serif; direction:ltr; display:inline-block;}
  .mono{font-family:'JetBrains Mono',monospace; direction:ltr;}

  /* ambient blobs */
  .blob{
    position:fixed; border-radius:50%; filter:blur(90px); opacity:.55; z-index:0; pointer-events:none;
  }
  .blob-a{width:520px; height:520px; background:var(--accent-a); top:-160px; right:-120px; animation:drift1 26s ease-in-out infinite;}
  .blob-b{width:460px; height:460px; background:var(--accent-b); bottom:-180px; left:-140px; animation:drift2 32s ease-in-out infinite;}
  .blob-c{width:320px; height:320px; background:var(--accent-c); top:40%; left:50%; animation:drift3 22s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,60px)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,-40px)}}
  @keyframes drift3{0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(-60%,-40%)}}
  @media (prefers-reduced-motion: reduce){ .blob{animation:none;} }

  header, main, footer{position:relative; z-index:1;}

  /* nav */
  nav{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1180px; margin:0 auto; padding:28px 24px 0;
  }
  .logo{display:flex; align-items:center; gap:12px;}
  .logo-mark{
    width:34px; height:34px; border-radius:11px;
    background:linear-gradient(135deg, var(--accent-a), var(--accent-b));
    box-shadow:0 0 24px rgba(167,139,250,.45);
  }
  .logo-text{font-size:18px; font-weight:600; letter-spacing:.3px;}
  .badge{
    font-size:11px; color:var(--text-muted); border:1px solid var(--stroke);
    padding:6px 12px; border-radius:100px; letter-spacing:.5px;
  }

  /* hero */
  .hero{
    max-width:1180px; margin:0 auto; padding:64px 24px 40px;
    display:grid; grid-template-columns:1fr 420px; gap:56px; align-items:center;
  }
  .eyebrow{
    font-size:12px; color:var(--accent-a); letter-spacing:2px; text-transform:uppercase;
    margin-bottom:18px; font-weight:600;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:52px; line-height:1.08; font-weight:700; letter-spacing:-.5px;
    margin-bottom:20px;
  }
  h1 .accent{
    background:linear-gradient(90deg, var(--accent-a), var(--accent-b));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .lede{
    color:var(--text-muted); font-size:16px; line-height:1.75; max-width:480px; margin-bottom:32px;
  }
  .cta-row{display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom:36px;}
  .btn-primary{
    background:var(--text-primary); color:#0a0c11; border:none; padding:13px 26px;
    border-radius:100px; font-weight:600; font-size:14px; cursor:pointer;
    font-family:inherit;
  }
  .btn-ghost{
    background:transparent; color:var(--text-primary); border:1px solid var(--stroke);
    padding:12px 24px; border-radius:100px; font-weight:500; font-size:14px; cursor:pointer;
    font-family:inherit;
  }
  .palette-picker{display:flex; align-items:center; gap:10px;}
  .palette-label{font-size:12px; color:var(--text-muted);}
  .swatch{
    width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent;
    transition:transform .2s ease, border-color .2s ease;
  }
  .swatch:hover{transform:scale(1.1);}
  .swatch.active{border-color:var(--text-primary);}

  /* phone mockup */
  .phone-wrap{display:flex; justify-content:center;}
  .phone{
    width:280px; height:560px; border-radius:44px; padding:14px;
    background:linear-gradient(160deg, #14161d, #0a0b10);
    border:1px solid var(--stroke); box-shadow:0 40px 80px -20px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.02);
    position:relative;
  }
  .screen{
    width:100%; height:100%; border-radius:32px; overflow:hidden; position:relative;
    background:
      radial-gradient(circle at 30% 20%, rgba(103,232,249,.35), transparent 45%),
      radial-gradient(circle at 75% 75%, rgba(167,139,250,.32), transparent 50%),
      radial-gradient(circle at 20% 85%, rgba(251,191,119,.25), transparent 45%),
      #0d0f16;
  }
  .status-bar{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 22px 6px; font-size:12px; color:rgba(255,255,255,.85);
  }
  .home-grid{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:16px;
    padding:20px 20px 0;
  }
  .home-grid .glass-icon{width:100%; aspect-ratio:1; border-radius:50%;}
  .dock{
    position:absolute; bottom:14px; left:14px; right:14px;
    display:grid; grid-template-columns:repeat(4,1fr); gap:14px;
    padding:12px; border-radius:34px;
    background:rgba(255,255,255,.05); backdrop-filter:blur(20px);
    border:1px solid var(--stroke-soft);
  }
  .dock .glass-icon{width:100%; aspect-ratio:1; border-radius:50%;}

  /* the signature glass tile — frosted circular glass, iOS Control-Center style */
  .glass-icon{
    --tint:255,255,255;
    --tint-alpha-1:.16;
    --tint-alpha-2:.04;
    position:relative; display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    background:
      radial-gradient(90% 90% at var(--mx,30%) var(--my,20%), rgba(255,255,255,.28), transparent 60%),
      linear-gradient(165deg, rgba(var(--tint),var(--tint-alpha-1)) 0%, rgba(var(--tint),var(--tint-alpha-2)) 100%),
      rgba(30,32,40,.35);
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,.45),
      inset 0 -10px 18px rgba(0,0,0,.4),
      0 10px 24px -10px rgba(0,0,0,.6);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid rgba(255,255,255,.3);
    overflow:hidden;
    cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .glass-icon::before{
    content:''; position:absolute; inset:0; border-radius:inherit;
    background:linear-gradient(125deg, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 35%);
    mix-blend-mode:overlay; pointer-events:none;
  }
  .glass-icon.tint-blue{ --tint:90,150,255; --tint-alpha-1:.55; --tint-alpha-2:.18; }
  .glass-icon.tint-yellow{ --tint:255,190,70; --tint-alpha-1:.6; --tint-alpha-2:.2; }
  .glass-icon.tint-red{ --tint:255,110,110; --tint-alpha-1:.5; --tint-alpha-2:.16; }
  .glass-icon:hover{ transform:translateY(-3px) scale(1.05); }
  .glass-icon svg{ width:44%; height:44%; color:#fff; position:relative; z-index:1; filter:drop-shadow(0 1px 2px rgba(0,0,0,.35)); }
  .home-grid .glass-icon svg, .dock .glass-icon svg{ width:46%; height:46%; }

  /* library section */
  .library{ max-width:1180px; margin:100px auto 40px; padding:0 24px; }
  .section-head{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:36px; flex-wrap:wrap; gap:16px; }
  .section-head h2{ font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:600; }
  .section-head p{ color:var(--text-muted); font-size:14px; max-width:420px; }

  .icon-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:22px;
  }
  .icon-card{
    display:flex; flex-direction:column; align-items:center; gap:12px;
    padding:20px 10px; border-radius:20px; background:var(--bg-panel); border:1px solid var(--stroke-soft);
    transition:border-color .2s ease;
  }
  .icon-card:hover{ border-color:var(--stroke); }
  .icon-card .glass-icon{ width:64px; height:64px; }
  .icon-card span{ font-size:12.5px; color:var(--text-muted); }

  /* build note */
  .buildnote{
    max-width:1180px; margin:80px auto 0; padding:22px 24px; border-top:1px solid var(--stroke-soft);
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
  }
  .buildnote p{ color:var(--text-muted); font-size:13px; line-height:1.8; max-width:640px; }
  footer{ padding:20px 24px 40px; text-align:center; color:var(--text-muted); font-size:12px; }

  @media (max-width:900px){
    .hero{ grid-template-columns:1fr; }
    .phone-wrap{ order:-1; }
    h1{ font-size:38px; }
  }
</style>
</head>
<body>

<div class="blob blob-a"></div>
<div class="blob blob-b"></div>
<div class="blob blob-c"></div>

<header>
  <nav>
    <div class="logo">
      <div class="logo-mark"></div>
      <span class="logo-text latin">Liquid Glass</span>
    </div>
    <div class="badge">معاينة أولية · Icon Pack</div>
  </nav>
</header>

<main>
  <section class="hero">
    <div>
      <div class="eyebrow">Android Icon Pack Concept</div>
      <h1>أيقونات <span class="accent">زجاجية سائلة</span><br>لهوية بصرية مميزة</h1>
      <p class="lede">
        نموذج تفاعلي أولي لأسلوب "Liquid Glass": شفافية، انعكاسات ضوئية، وألوان متداخلة خلف كل أيقونة.
        هذا الملف نقطة انطلاق نبني عليها الشكل النهائي قبل تجهيز الأصول لملف الـ APK.
      </p>
      <div class="cta-row">
        <button class="btn-primary">تحميل الأصول (SVG)</button>
        <button class="btn-ghost">معاينة على الشاشة الكاملة</button>
      </div>
      <div class="palette-picker">
        <span class="palette-label">تبديل نظام الألوان:</span>
        <div class="swatch active" style="background:linear-gradient(135deg,#67e8f9,#a78bfa)" data-a="#67e8f9" data-b="#a78bfa" data-c="#fbbf77"></div>
        <div class="swatch" style="background:linear-gradient(135deg,#ff8fb1,#ffd166)" data-a="#ff8fb1" data-b="#ffd166" data-c="#8fd3ff"></div>
        <div class="swatch" style="background:linear-gradient(135deg,#7cf5b0,#5aa9ff)" data-a="#7cf5b0" data-b="#5aa9ff" data-c="#c792ff"></div>
        <div class="swatch" style="background:linear-gradient(135deg,#ffb37c,#ff6b6b)" data-a="#ffb37c" data-b="#ff6b6b" data-c="#7ce8d8"></div>
      </div>
    </div>

    <div class="phone-wrap">
      <div class="phone">
        <div class="screen">
          <div class="status-bar">
            <span class="mono">9:41</span>
            <span class="mono">●●● 100%</span>
          </div>
          <div class="home-grid" id="homeGrid"></div>
          <div class="dock" id="dockGrid"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="library">
    <div class="section-head">
      <div>
        <h2>مكتبة الأيقونات</h2>
        <p>كل بطاقة أيقونة حقيقية بتأثير الزجاج — حرّك المؤشر فوقها لترى انعكاس الضوء يتبعه.</p>
      </div>
    </div>
    <div class="icon-grid" id="libraryGrid"></div>
  </section>
</main>

<div class="buildnote">
  <p>
    <span class="mono">v0.1 · concept</span> — الخطوة التالية: تحويل كل أيقونة إلى Adaptive Icon
    (foreground/background منفصلين) وربطها بـ appfilter.xml لاختبارها داخل لانشر حقيقي قبل التصدير كـ APK.
  </p>
</div>

<footer>Liquid Glass Icon Pack — نموذج معاينة داخلي، غير مخصص للنشر</footer>

<script>
// ---- icon glyphs (simple line icons, currentColor stroke) ----
const glyphs = {
  phone: '<path d="M6 3h6l1.5 4-2 2c1 2.5 2.5 4 5 5l2-2 4 1.5v6c0 1-1 2-2 2C11 21.5 2.5 13 2 4c0-1 1-1 2-1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  message: '<path d="M4 5h16v11H9l-4 3.5V16H4z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  camera: '<path d="M4 8h3l1.5-2h7L17 8h3v11H4z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="13.5" r="3.2" fill="none" stroke="currentColor" stroke-width="1.6"/>',
  gallery: '<rect x="4" y="5" width="16" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="9" cy="10" r="1.6" fill="currentColor"/><path d="M5 17l5-5 4 4 3-3 4 4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  settings: '<circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 3v3M12 18v3M21 12h-3M6 12H3M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1M18.4 18.4l-2.1-2.1M7.7 7.7 5.6 5.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>',
  calendar: '<rect x="4" y="6" width="16" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4 10h16M8 4v4M16 4v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>',
  clock: '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 8v4l3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>',
  music: '<path d="M9 17.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5zM19 15.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M11.5 15V5.5L21.5 4v10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  map: '<path d="M12 21s7-6.5 7-11.5A7 7 0 1 0 5 9.5C5 14.5 12 21 12 21z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="9.5" r="2.3" fill="none" stroke="currentColor" stroke-width="1.6"/>',
  browser: '<circle cx="12" cy="12" r="8.2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4 12h16M12 3.8c2.4 2.3 3.6 5.2 3.6 8.2s-1.2 5.9-3.6 8.2c-2.4-2.3-3.6-5.2-3.6-8.2S9.6 6.1 12 3.8z" fill="none" stroke="currentColor" stroke-width="1.6"/>',
  mail: '<rect x="3.5" y="6" width="17" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4.5 7.5 12 13l7.5-5.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  weather: '<circle cx="9" cy="9" r="3.2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M13 17H8a3.5 3.5 0 0 1-.5-6.96A5 5 0 0 1 17 12.2 3 3 0 0 1 16 18h-1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  calculator: '<rect x="5" y="3.5" width="14" height="17" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M7.5 7.5h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="8" cy="12" r=".9" fill="currentColor"/><circle cx="12" cy="12" r=".9" fill="currentColor"/><circle cx="16" cy="12" r=".9" fill="currentColor"/><circle cx="8" cy="16" r=".9" fill="currentColor"/><circle cx="12" cy="16" r=".9" fill="currentColor"/><circle cx="16" cy="16" r=".9" fill="currentColor"/>',
  contacts: '<circle cx="12" cy="9" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M5.5 19c1-3.5 3.7-5 6.5-5s5.5 1.5 6.5 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>',
  notes: '<rect x="5" y="3.5" width="14" height="17" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>'
};

const labels = {
  phone:'الهاتف', message:'الرسائل', camera:'الكاميرا', gallery:'المعرض', settings:'الإعدادات',
  calendar:'التقويم', clock:'الساعة', music:'الموسيقى', map:'الخرائط', browser:'المتصفح',
  mail:'البريد', weather:'الطقس', calculator:'الآلة الحاسبة', contacts:'جهات الاتصال', notes:'الملاحظات'
};

// tint mix inspired by iOS Control Center: mostly neutral frosted glass, a few colored accents
const tints = {
  phone:'', message:'', camera:'', gallery:'', settings:'tint-blue',
  calendar:'', clock:'', music:'', map:'', browser:'tint-blue',
  mail:'', weather:'tint-yellow', calculator:'', contacts:'', notes:''
};

function makeTile(name, size){
  const el = document.createElement('div');
  el.className = 'glass-icon ' + (tints[name] || '');
  el.innerHTML = `<svg viewBox="0 0 24 24">${glyphs[name]}</svg>`;
  el.addEventListener('pointermove', e=>{
    const r = el.getBoundingClientRect();
    const x = ((e.clientX - r.left)/r.width*100).toFixed(0);
    const y = ((e.clientY - r.top)/r.height*100).toFixed(0);
    el.style.setProperty('--mx', x+'%');
    el.style.setProperty('--my', y+'%');
  });
  return el;
}

const homeOrder = ['phone','message','camera','gallery','settings','calendar','clock','music','map','browser','mail','weather'];
const dockOrder = ['phone','browser','camera','message'];
const homeGrid = document.getElementById('homeGrid');
const dockGrid = document.getElementById('dockGrid');
homeOrder.forEach(n=> homeGrid.appendChild(makeTile(n)));
dockOrder.forEach(n=> dockGrid.appendChild(makeTile(n)));

const libraryGrid = document.getElementById('libraryGrid');
Object.keys(glyphs).forEach(name=>{
  const card = document.createElement('div');
  card.className = 'icon-card';
  card.appendChild(makeTile(name));
  const span = document.createElement('span');
  span.textContent = labels[name];
  card.appendChild(span);
  libraryGrid.appendChild(card);
});

// palette switcher
document.querySelectorAll('.swatch').forEach(sw=>{
  sw.addEventListener('click', ()=>{
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
    document.documentElement.style.setProperty('--accent-a', sw.dataset.a);
    document.documentElement.style.setProperty('--accent-b', sw.dataset.b);
    document.documentElement.style.setProperty('--accent-c', sw.dataset.c);
  });
});
</script>
</body>
</html>
